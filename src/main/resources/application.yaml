server:
  port: 8080
  servlet:
    context-path: /identity

spring:
  application:
    name: buildpcchecker

  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  base-url: ${BASE_URL}
  file:
    upload-dir: ${UPLOAD_DIR:/tmp/uploads}
  openapi:
    dev-url: ${BASE_URL}

jwt:
  signerKey: ${JWT_SECRET}
  valid-duration: 300
  refreshable-duration: 1200

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true